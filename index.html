<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="菜園ノート">
<meta name="theme-color" content="#4a6741">
<title>家庭菜園ノート</title>
<!-- Firebase SDK (compat版) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    storageBucket: "garden-f6624.firebasestorage.app",
    messagingSenderId: "196057665944",
    appId: "1:196057665944:web:f83e1edd4523d87352dbed"
  });
  // compat APIをwindow._fbに格納
  window._fb = {

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Shippori+Mincho:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --soil:#3d2b1f;--bark:#6b4226;--moss:#4a6741;--leaf:#6b9e5e;
  --sprout:#a8c97f;--cream:#f5f0e8;--petal:#e8d5b7;--sun:#e8a830;
  --sky:#7fb3d3;--rain:#5e8fa8;--r:.75rem;
  --urgent:#e07a5f;--warn:#e8a830;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--cream);color:var(--soil);font-size:14px;}

/* ── Layout ── */
#app{height:100%;display:flex;flex-direction:column;max-width:560px;margin:0 auto;position:relative;}
.screen{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 0 80px;}
.hidden{display:none!important;}

/* ── Header ── */
.top-bar{background:linear-gradient(135deg,var(--moss),var(--leaf));color:#fff;padding:14px 16px 12px;position:sticky;top:0;z-index:10;display:flex;align-items:center;gap:10px;}
.top-bar h1{font-family:sans-serif;font-size:1.15rem;font-weight:600;flex:1;}
.top-bar .sub{font-size:.7rem;opacity:.85;}
.top-icon{font-size:1.8rem;}
.icon-btn{background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:50%;width:36px;height:36px;cursor:pointer;font-size:1.1rem;display:flex;align-items:center;justify-content:center;}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#fff;border-top:1px solid var(--petal);display:flex;z-index:20;padding-bottom:env(safe-area-inset-bottom);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 4px;border:none;background:none;cursor:pointer;font-family:inherit;font-size:.62rem;color:#999;transition:color .15s;}
.nav-btn.active{color:var(--moss);font-weight:700;}
.nav-btn .nav-icon{font-size:1.35rem;}

/* ── Cards ── */
.plant-card{background:#fff;border-radius:12px;margin:8px 12px;border:1.5px solid var(--petal);overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;active:transform scale(.98);}
.plant-card:active{transform:scale(.98);}
.plant-card.urgent{border-color:var(--urgent);}
.plant-card.warning{border-color:var(--warn);}
.card-inner{display:flex;align-items:center;gap:10px;padding:12px;}
.card-thumb{width:56px;height:56px;border-radius:10px;object-fit:cover;flex-shrink:0;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:1.8rem;}
.card-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.card-info{flex:1;min-width:0;}
.card-name{font-family:sans-serif;font-size:.95rem;font-weight:600;}
.card-variety{font-size:.7rem;color:#999;margin-top:1px;}
.card-badges{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.badge{font-size:.62rem;padding:2px 7px;border-radius:20px;font-weight:600;}
.badge-green{background:#e8f5e2;color:#3a5c32;}
.badge-yellow{background:#fff3d4;color:#8b5200;}
.badge-red{background:#fde8e3;color:#c0392b;}
.badge-blue{background:#e3f0fa;color:var(--rain);}
.badge-gray{background:#f0f0f0;color:#666;}
.badge-cat{font-size:.62rem;padding:2px 7px;border-radius:20px;font-weight:600;}
.cat-vegetable{background:#e8f5e2;color:#3a5c32;}
.cat-fruit_tree{background:#fff0e0;color:#8b4500;}
.cat-tree{background:#e8f0e0;color:#3a5020;}
.cat-herb{background:#f0f8e8;color:#4a6030;}
.cat-flower{background:#fce8f8;color:#8b2080;}
.cat-other{background:#f0f0f0;color:#555;}
.card-care{display:flex;gap:6px;padding:0 12px 10px;flex-wrap:wrap;}
.care-chip{font-size:.65rem;background:var(--cream);padding:2px 8px;border-radius:20px;color:#666;}

/* ── Section title ── */
.sec-title{font-family:sans-serif;font-size:.85rem;font-weight:600;color:var(--soil);padding:14px 16px 6px;display:flex;align-items:center;justify-content:space-between;}
.sec-sub{font-size:.68rem;color:#aaa;font-weight:400;}

/* ── Filter tabs ── */
.filter-row{display:flex;gap:6px;padding:4px 12px 8px;overflow-x:auto;-webkit-overflow-scrolling:touch;}
.filter-row::-webkit-scrollbar{display:none;}
.filter-chip{flex-shrink:0;border:1.5px solid var(--petal);background:var(--cream);border-radius:20px;padding:4px 12px;font-size:.68rem;font-weight:700;cursor:pointer;color:var(--bark);white-space:nowrap;font-family:inherit;}
.filter-chip.active{background:var(--moss);border-color:var(--moss);color:#fff;}

/* ── Weather bar ── */
.weather-row{display:flex;gap:6px;padding:8px 12px;overflow-x:auto;}
.weather-row::-webkit-scrollbar{display:none;}
.w-card{flex-shrink:0;background:#fff;border:1.5px solid var(--petal);border-radius:10px;padding:7px 10px;text-align:center;min-width:68px;}
.w-card.today{border-color:var(--leaf);background:#f0f9ec;}
.w-day{font-size:.58rem;font-weight:700;color:var(--bark);}
.w-icon{font-size:1.4rem;margin:2px 0;}
.w-temp{font-size:.72rem;font-weight:700;}
.w-rain{font-size:.58rem;color:#888;margin-top:1px;}

/* ── Detail ── */
.detail-header{background:linear-gradient(135deg,var(--moss),var(--leaf));color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px;}
.detail-thumb{width:52px;height:52px;border-radius:10px;object-fit:cover;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:1.8rem;flex-shrink:0;}
.detail-thumb img{width:100%;height:100%;object-fit:cover;border-radius:10px;}
.detail-name{font-family:sans-serif;font-size:1.05rem;font-weight:600;}
.detail-meta{font-size:.68rem;opacity:.85;margin-top:2px;}
.action-row{display:flex;gap:8px;padding:10px 12px;}
.action-btn{flex:1;border:none;border-radius:10px;padding:10px;cursor:pointer;font-family:inherit;font-size:.78rem;font-weight:700;display:flex;align-items:center;justify-content:center;gap:5px;}
.action-btn.water{background:#e3f0fa;color:var(--rain);border:1.5px solid var(--sky);}
.action-btn.fertilize{background:#fff8e6;color:#9a6500;border:1.5px solid var(--sun);}
.action-btn.photo{background:#f0f9ec;color:var(--moss);border:1.5px solid var(--sprout);}

/* ── Health bar ── */
.health-wrap{padding:4px 12px 10px;}
.health-label{font-size:.72rem;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;}
.health-track{height:8px;background:var(--petal);border-radius:4px;overflow:hidden;}
.health-fill{height:100%;border-radius:4px;transition:width .6s;}

/* ── Care status ── */
.care-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:0 12px 10px;}
.care-box{border-radius:10px;padding:10px;text-align:center;}
.care-box .c-icon{font-size:1.4rem;}
.care-box .c-label{font-size:.65rem;font-weight:700;margin-top:3px;}
.care-box .c-val{font-size:.75rem;color:#555;margin-top:1px;}
.care-box .c-next{font-size:.6rem;color:#aaa;margin-top:1px;}

/* ── Scan section ── */
.scan-box{margin:0 12px 10px;background:linear-gradient(135deg,#fff8f0,#fff3e8);border:1.5px solid #e8b87a;border-radius:12px;padding:12px;}
.scan-title{font-size:.7rem;font-weight:700;color:#9a5a00;text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;}
.scan-drop{border:2px dashed #e8b87a;border-radius:10px;padding:14px;text-align:center;position:relative;background:rgba(255,255,255,.6);}
.scan-drop input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}
.diagnose-btn{width:100%;background:linear-gradient(135deg,#e8a830,#c87000);color:#fff;border:none;border-radius:10px;padding:11px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:5px;}
.diagnose-btn:disabled{opacity:.5;}
.ai-box{background:linear-gradient(135deg,#f0f9ec,#fefcf7);border:1.5px solid var(--sprout);border-radius:10px;padding:11px 13px;margin-top:8px;font-size:.78rem;line-height:1.6;color:var(--soil);}
.ai-box-title{font-weight:700;color:var(--moss);margin-bottom:5px;font-size:.8rem;}
.diag-box{background:linear-gradient(135deg,#fff8f0,#fff3e8);border:1.5px solid #e8b87a;border-radius:10px;padding:11px 13px;margin-top:8px;font-size:.78rem;line-height:1.6;}
.diag-title{font-weight:700;color:#9a5a00;margin-bottom:5px;}
.chip{display:inline-flex;align-items:center;background:#fff;border-radius:20px;padding:2px 9px;font-size:.7rem;font-weight:700;border:1.5px solid currentColor;margin-right:5px;margin-bottom:5px;}

/* ── Photo grid ── */
.photo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 12px 10px;}
.photo-item{position:relative;aspect-ratio:1;border-radius:8px;overflow:hidden;cursor:pointer;}
.photo-item img{width:100%;height:100%;object-fit:cover;}
.photo-item .p-date{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(0,0,0,.6));color:#fff;font-size:.55rem;padding:3px 5px;}
.photo-add{aspect-ratio:1;border-radius:8px;border:2px dashed var(--petal);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:var(--cream);font-size:.65rem;color:#aaa;gap:3px;position:relative;}
.photo-add input{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;}

/* ── Log ── */
.log-list{padding:0 12px;}
.log-item{display:flex;gap:8px;align-items:flex-start;padding:8px 0;border-bottom:1px solid var(--cream);}
.log-item:last-child{border-bottom:none;}
.log-date{font-size:.68rem;font-weight:700;color:var(--bark);flex-shrink:0;padding-top:1px;}
.log-text{font-size:.78rem;color:var(--soil);flex:1;line-height:1.45;}
.log-thumb{width:40px;height:40px;border-radius:6px;object-fit:cover;flex-shrink:0;cursor:pointer;}
.log-form{display:flex;gap:6px;padding:8px 12px;position:sticky;bottom:80px;background:var(--cream);border-top:1px solid var(--petal);}
.log-form input{flex:1;border:1.5px solid var(--petal);border-radius:10px;padding:8px 11px;font-family:inherit;font-size:.82rem;background:#fff;outline:none;}
.log-form input:focus{border-color:var(--leaf);}
.log-form .add-photo-btn{background:#e3f0fa;border:1.5px solid var(--sky);border-radius:10px;padding:8px 10px;cursor:pointer;font-size:.85rem;position:relative;display:flex;align-items:center;}
.log-form .add-photo-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.log-form .submit-btn{background:var(--moss);color:#fff;border:none;border-radius:10px;padding:8px 13px;cursor:pointer;font-family:inherit;font-size:.82rem;font-weight:700;}

/* ── Add plant modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:flex-end;animation:slideUp .25s;}
@keyframes slideUp{from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:none;}}
.modal{background:#fff;border-radius:20px 20px 0 0;width:100%;max-height:90vh;overflow-y:auto;padding:16px 16px calc(16px + env(safe-area-inset-bottom));}
.modal-handle{width:36px;height:4px;background:var(--petal);border-radius:2px;margin:0 auto 14px;}
.modal h2{font-family:sans-serif;font-size:1.05rem;margin-bottom:14px;}
.form-row{margin-bottom:12px;}
.form-row label{display:block;font-size:.72rem;font-weight:700;color:var(--bark);margin-bottom:4px;}
.form-row input,.form-row select,.form-row textarea{width:100%;border:1.5px solid var(--petal);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:.88rem;color:var(--soil);outline:none;background:#fff;}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:var(--leaf);}
.cat-tabs{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;margin-bottom:8px;}
.cat-tabs::-webkit-scrollbar{display:none;}
.cat-tab{flex-shrink:0;border:1.5px solid var(--petal);background:var(--cream);border-radius:20px;padding:4px 11px;font-size:.68rem;font-weight:700;cursor:pointer;color:var(--bark);white-space:nowrap;font-family:inherit;}
.cat-tab.active{background:var(--moss);border-color:var(--moss);color:#fff;}
.emoji-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px;margin-bottom:2px;}
.emoji-btn{font-size:1.4rem;border:2px solid transparent;background:var(--cream);border-radius:8px;cursor:pointer;padding:3px;aspect-ratio:1;display:flex;align-items:center;justify-content:center;}
.emoji-btn.sel{border-color:var(--moss);background:#e8f5e2;}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-actions{display:flex;gap:8px;margin-top:16px;}
.btn-p{flex:1;background:var(--moss);color:#fff;border:none;border-radius:12px;padding:12px;font-family:inherit;font-size:.92rem;font-weight:700;cursor:pointer;}
.btn-s{flex:1;background:var(--cream);color:var(--soil);border:1.5px solid var(--petal);border-radius:12px;padding:12px;font-family:inherit;font-size:.92rem;cursor:pointer;}

/* ── Reminder list ── */
.reminder-item{display:flex;gap:10px;align-items:flex-start;padding:10px 12px;border-bottom:1px solid var(--cream);}
.r-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px;}
.r-dot.red{background:var(--urgent);}
.r-dot.yellow{background:var(--sun);}
.r-dot.green{background:var(--leaf);}
.r-text{font-size:.8rem;line-height:1.4;}
.r-when{font-size:.65rem;color:#aaa;margin-top:2px;}
/* 一括操作 */
.bulk-bar{display:flex;gap:6px;padding:8px 12px;background:#fff;border-bottom:1px solid var(--petal);position:sticky;top:56px;z-index:5;}
.bulk-btn{flex:1;border:none;border-radius:10px;padding:9px;font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;}
.bulk-btn.water{background:#e3f0fa;color:var(--rain);}
.bulk-btn.fert{background:#fff8e6;color:#9a6500;}
.bulk-btn.select-all{background:var(--cream);color:var(--bark);border:1.5px solid var(--petal);}
.care-item-row{display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--cream);cursor:pointer;}
.care-item-row.selected{background:#f0f9ec;}
.care-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--petal);background:#fff;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.9rem;}
.care-check.checked{background:var(--moss);border-color:var(--moss);color:#fff;}
.care-overdue{border-left:3px solid var(--urgent);}
.care-due-soon{border-left:3px solid var(--sun);}
/* カレンダー詳細 */
.cal-day-detail{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:150;display:flex;align-items:flex-end;}
.cal-day-panel{background:#fff;border-radius:20px 20px 0 0;width:100%;padding:16px;max-height:60vh;overflow-y:auto;}
/* 期限切れ強調 */
.overdue-badge{background:#fde8e3;color:#c0392b;border-radius:6px;padding:2px 7px;font-size:.65rem;font-weight:700;}
.due-soon-badge{background:#fff3d4;color:#9a6500;border-radius:6px;padding:2px 7px;font-size:.65rem;font-weight:700;}

/* ── Lightbox ── */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;display:flex;align-items:center;justify-content:center;}
#lightbox img{max-width:100%;max-height:100%;object-fit:contain;}
#lightbox .lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:1.3rem;border-radius:50%;width:40px;height:40px;cursor:pointer;}

/* ── Loading ── */
.dots span{animation:blink 1.2s infinite;display:inline-block;}
.dots span:nth-child(2){animation-delay:.2s;}
.dots span:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:0;}40%{opacity:1;}}

/* ── Source picker ── */
.src-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.src-btn{display:flex;flex-direction:column;align-items:center;gap:4px;padding:10px 6px;border-radius:10px;border:1.5px solid var(--petal);background:#fff;cursor:pointer;font-family:inherit;font-size:.68rem;font-weight:700;color:var(--bark);position:relative;overflow:hidden;text-align:center;}
.src-btn input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.src-btn .s-icon{font-size:1.5rem;}
.src-divider{text-align:center;font-size:.68rem;color:#bbb;margin:6px 0;display:flex;align-items:center;gap:6px;}
.src-divider::before,.src-divider::after{content:'';flex:1;height:1px;background:var(--petal);}
.url-row{display:flex;gap:6px;}
.url-row input{flex:1;border:1.5px solid var(--petal);border-radius:10px;padding:8px 10px;font-family:inherit;font-size:.78rem;outline:none;}
.url-row input:focus{border-color:var(--leaf);}
.url-row button{background:var(--moss);color:#fff;border:none;border-radius:10px;padding:8px 12px;font-family:inherit;font-size:.78rem;cursor:pointer;white-space:nowrap;}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:#ccc;}
.empty .e-icon{font-size:3rem;margin-bottom:8px;}
.empty p{font-size:.85rem;}

/* ── Toast ── */
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--soil);color:#fff;padding:9px 18px;border-radius:20px;font-size:.8rem;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* ── Saving indicator ── */
.saving{font-size:.65rem;color:var(--sprout);opacity:.8;}
</style>
</head>
<body>
<div id="app">
  <div id="screen-list" class="screen"></div>
  <div id="screen-today" class="screen hidden"></div>
  <div id="screen-detail" class="screen hidden"></div>
  <div id="screen-add" class="hidden"></div>
  <div id="lightbox" class="hidden"><button class="lb-close" onclick="closeLightbox()">✕</button><img id="lb-img" src="" alt=""></div>
  <div id="toast"></div>

  <nav class="bottom-nav">
    <button class="nav-btn active" data-screen="list" onclick="showScreen('list')">
      <span class="nav-icon">🌱</span><span>植物一覧</span>
    </button>
    <button class="nav-btn" data-screen="today" onclick="showScreen('today')">
      <span class="nav-icon">📋</span><span>今日のお世話</span>
    </button>
    <button class="nav-btn" data-screen="add" onclick="openAddModal()">
      <span class="nav-icon">➕</span><span>追加</span>
    </button>
  </nav>
</div>

<script>
// ── Storage ───────────────────────────────────────────────────────────────────
const STORAGE_KEY = "garden-plants-v2";

// ── Firebase同期ストレージ ────────────────────────────────────────────────────
// ユーザーがログイン済みならFirestore、未ログインはlocalStorageにフォールバック
var state_uid = null;  // ログイン中ユーザーのUID

function loadPlants() {
  try { var v=localStorage.getItem(STORAGE_KEY); if(v)return JSON.parse(v); } catch(e){}
  return getDefaultPlants();
}

function savePlants() {
  // localStorage常に更新（オフライン用）
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.plants)); } catch(e){}
  // Firestoreにも保存（ログイン中のみ）
  if(state_uid && window._fb){
    var ts = Date.now();
    state._lastSave = ts;
    window._fb.db.collection("users").doc(state_uid)
      .collection("data").doc("plants")
      .set({ list: state.plants, updated: ts })
      .catch(function(e){ console.warn("Firestore save error:", e); });
  }
  return Promise.resolve();
}

// Firestoreからロードしてローカルを上書き
async function loadFromFirestore(uid){
  if(!window._fb) return;
  state._lastSave = 0;
  try {
    var ref = window._fb.db.collection("users").doc(uid).collection("data").doc("plants");
    var snap = await ref.get();
    if(snap.exists){
      var data = snap.data();
      if(data.list && data.list.length > 0){
        state.plants = data.list;
        state._lastSave = data.updated || 0;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.plants));
        renderList();
        if(state.currentScreen==="today") renderToday();
        showToast("クラウドからデータを同期しました");
      }
    }
    // リアルタイム監視
    ref.onSnapshot(function(snap){
      if(!snap.exists) return;
      var data = snap.data();
      var remoteTs = data.updated || 0;
      if(remoteTs > (state._lastSave || 0) + 1000){
        state.plants = data.list;
        state._lastSave = remoteTs;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state.plants));
        renderList();
        if(state.currentScreen==="today") renderToday();
        if(state.detailId) renderDetail();
        showToast("他のデバイスからデータを受信しました");
      }
    });
  } catch(e){ console.warn("Firestore load error:", e); }
}

// Open-Meteo（無料・APIキー不要）で7日間天気を取得
async function fetchWeather(lat, lon) {
  try {
    var url = "https://api.open-meteo.com/v1/forecast?latitude="+lat+"&longitude="+lon
      +"&daily=weathercode,temperature_2m_max,temperature_2m_min,precipitation_probability_max"
      +"&timezone=Asia%2FTokyo&forecast_days=7";
    var res = await fetch(url);
    var data = await res.json();
    var daily = data.daily;
    var dayNames = ["日","月","火","水","木","金","土"];
    WEATHER = daily.time.map(function(t,i){
      var d = new Date(t);
      var label = i===0?"今日":i===1?"明日":dayNames[d.getDay()]+"曜";
      return {
        day:  label,
        icon: wmoIcon(daily.weathercode[i]),
        temp: Math.round(daily.temperature_2m_max[i])+"°C",
        tempMin: Math.round(daily.temperature_2m_min[i])+"°C",
        rain: daily.precipitation_probability_max[i]||0,
      };
    });
    return true;
  } catch(e) { return false; }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function daysSince(d){ if(!d)return 999; return Math.floor((Date.now()-new Date(d))/86400000); }
function urgency(p){
  var w=daysSince(p.lastWatered)>=p.waterDays;
  var f=daysSince(p.lastFertilized)>=p.fertilizeDays;
  if(w||(f&&daysSince(p.lastFertilized)>=p.fertilizeDays+3))return"urgent";
  if(f)return"warning"; return"ok";
}
function fmtDate(d){ return new Date(d).toLocaleDateString("ja-JP",{month:"short",day:"numeric"}); }
function todayStr(){ return new Date().toISOString().split("T")[0]; }
function daysLabel(n){ return n===0?"今日":(n+"日前"); }

function showToast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg; t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2000);
}

function compressImage(file, maxW, quality) {
  maxW = maxW||800; quality = quality||0.75;
  return new Promise(function(res){
    var img=new Image(), url=URL.createObjectURL(file);
    img.onload=function(){
      var s=Math.min(1,maxW/Math.max(img.width,img.height));
      var c=document.createElement("canvas");
      c.width=img.width*s; c.height=img.height*s;
      c.getContext("2d").drawImage(img,0,0,c.width,c.height);
      URL.revokeObjectURL(url);
      res(c.toDataURL("image/jpeg",quality));
    };
    img.src=url;
  });
}

    html += '<div style="display:flex;align-items:center;justify-content:space-between;padding:12px 12px 4px;">';
    html += '<div style="font-family:sans-serif;font-size:.9rem;font-weight:600;">🌱 追肥が必要 <span style="font-size:.75rem;color:var(--sun);font-weight:700;">('+fertItems.length+'株)</span></div>';
    html += '<div style="display:flex;gap:5px;">';
    html += '<button onclick="selectAllToday(\'f\')" style="background:var(--cream);border:1.5px solid var(--petal);border-radius:8px;padding:4px 10px;font-size:.7rem;cursor:pointer;font-family:inherit;">'+(allFertSel?"選択解除":"全選択")+'</button>';
    html += '<button onclick="bulkFert()" style="background:#fff8e6;color:#9a6500;border:1.5px solid var(--sun);border-radius:8px;padding:4px 10px;font-size:.7rem;font-weight:700;cursor:pointer;font-family:inherit;">まとめて記録</button>';
    html += '</div></div>';
    fertItems.forEach(function(it){
      var k=it.p.id+"_f", sel=todaySelected[k];
      var rowCls = it.overdue ? "care-item-row care-overdue" : "care-item-row care-due-soon";
      html += '<div class="'+rowCls+(sel?' selected':'')+' today-row" data-id="'+it.p.id+'" data-type="f" onclick="handleTodayRow(event)">';
      html += '<div class="care-check'+(sel?" checked":"")+'">'+( sel?"✓":"")+'</div>';
      html += '<div style="flex:1"><div style="font-size:.82rem;font-weight:700;">'+it.p.emoji+' '+it.p.name+'</div>';
      html += '<div style="font-size:.68rem;color:#888;">'+it.p.variety+'</div></div>';
      html += it.overdue
        ? '<span class="overdue-badge">'+it.days+'日超過</span>'
        : '<span class="due-soon-badge">本日</span>';
      html += '</div>';
    });
  }

  if(waterItems.length===0 && fertItems.length===0){
    html += '<div class="empty" style="padding:24px"><div class="e-icon">🎉</div><p>今日のお世話はすべて完了！</p></div>';
  }

  // ── カレンダー ──
  html += '<div class="sec-title" style="margin-top:8px;">📅 今月のお世話カレンダー</div>';
  html += '<div style="padding:0 12px 16px;">'+buildCalendarDetail()+'</div>';

  el.innerHTML = html;
}

function handleTodayRow(e){
  var el=e.currentTarget;
  var id=parseInt(el.dataset.id), type=el.dataset.type;
  toggleTodaySelect(id,type);
}
function toggleTodaySelect(id, type){
  var k = id+"_"+type;
  todaySelected[k] = !todaySelected[k];
  renderToday();
}

function selectAllToday(type){
  var items = type==="w"
    ? state.plants.filter(function(p){return daysSince(p.lastWatered)>=p.waterDays;})
    : state.plants.filter(function(p){return daysSince(p.lastFertilized)>=p.fertilizeDays;});
  var keys = items.map(function(p){return p.id+"_"+type;});
  var allSel = keys.every(function(k){return todaySelected[k];});
  keys.forEach(function(k){ todaySelected[k] = !allSel; });
  renderToday();
}

function bulkWater(){
  var ids = Object.keys(todaySelected).filter(function(k){return k.endsWith("_w")&&todaySelected[k];}).map(function(k){return parseInt(k);});
  if(ids.length===0){ showToast("水やりする植物を選択してください"); return; }
  state.plants.forEach(function(p){
    if(ids.indexOf(p.id)>=0){
      p.lastWatered=todayStr();
      p.logs=(p.logs||[]).concat([{date:todayStr(),note:"水やり記録（一括）"}]);
    }
  });
  ids.forEach(function(id){ delete todaySelected[id+"_w"]; });
  savePlants();
  renderToday();
  renderList();
  showToast(ids.length+"株の水やりを記録しました");
}

function bulkFert(){
  var ids = Object.keys(todaySelected).filter(function(k){return k.endsWith("_f")&&todaySelected[k];}).map(function(k){return parseInt(k);});
  if(ids.length===0){ showToast("追肥する植物を選択してください"); return; }
  state.plants.forEach(function(p){
    if(ids.indexOf(p.id)>=0){
      p.lastFertilized=todayStr();
      p.logs=(p.logs||[]).concat([{date:todayStr(),note:"追肥記録（一括）"}]);
    }
  });
  ids.forEach(function(id){ delete todaySelected[id+"_f"]; });
  savePlants();
  renderToday();
  renderList();
  showToast(ids.length+"株の追肥を記録しました");
}

function buildCalendar() { return buildCalendarDetail(); }

function buildCalendarDetail() {
  var now=new Date(), yr=now.getFullYear(), mo=now.getMonth();
  var firstDow=new Date(yr,mo,1).getDay(), dim=new Date(yr,mo+1,0).getDate();

  // 日付ごとのお世話リストを作成
  var dayMap = {};  // {day: [{p, type, label}]}
  state.plants.forEach(function(p){
    // 水やり予定
    for(var i=0;i<=60;i++){
      var d=new Date(p.lastWatered); d.setDate(d.getDate()+i*p.waterDays);
      if(d.getFullYear()===yr&&d.getMonth()===mo){
        var day=d.getDate();
        if(!dayMap[day]) dayMap[day]=[];
        dayMap[day].push({p:p, type:"w", label:p.emoji+" "+p.name+" 水やり"});
      }
    }
    // 追肥予定
    for(var j=0;j<=60;j++){
      var d2=new Date(p.lastFertilized); d2.setDate(d2.getDate()+j*p.fertilizeDays);
      if(d2.getFullYear()===yr&&d2.getMonth()===mo){
        var day2=d2.getDate();
        if(!dayMap[day2]) dayMap[day2]=[];
        dayMap[day2].push({p:p, type:"f", label:p.emoji+" "+p.name+" 追肥"});
      }
    }
  });

  var html='<div style="background:#fff;border-radius:12px;padding:10px;border:1.5px solid var(--petal);">';
  html+='<div style="text-align:center;font-weight:700;font-size:.85rem;margin-bottom:8px;">'+yr+'年'+(mo+1)+'月</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:3px;">';
  ["日","月","火","水","木","金","土"].forEach(function(d){
    html+='<div style="text-align:center;font-size:.58rem;color:#aaa;padding:2px;">'+d+'</div>';
  });
  for(var i=0;i<firstDow;i++) html+='<div></div>';
  for(var day=1;day<=dim;day++){
    var isToday=day===now.getDate();
    var items=dayMap[day]||[];
    var hasW=items.some(function(it){return it.type==="w";});
    var hasF=items.some(function(it){return it.type==="f";});
    var isPast=day<now.getDate();
    var bg=isToday?"var(--moss)":"transparent";
    var col=isToday?"#fff":isPast&&items.length>0?"#ccc":"var(--soil)";
    var clickAttr=items.length>0?'onclick="showCalDayDetail('+day+')" style="cursor:pointer;"':'';
    html+='<div '+clickAttr+' style="text-align:center;font-size:.72rem;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:8px;background:'+bg+';color:'+col+';'+(items.length>0&&!isToday?"background:#f9f9f9;":"")+'">';
    html+=day;
    if(items.length>0){
      html+='<div style="display:flex;gap:1px;margin-top:1px;">';
      if(hasW) html+='<span style="width:5px;height:5px;border-radius:50%;background:'+(isPast?"#ccc":"var(--sky)")+';display:block;"></span>';
      if(hasF) html+='<span style="width:5px;height:5px;border-radius:50%;background:'+(isPast?"#ccc":"var(--sun)")+';display:block;"></span>';
      html+='</div>';
    }
    html+='</div>';
  }
  html+='</div>';
  html+='<div style="font-size:.6rem;color:#888;margin-top:8px;display:flex;gap:10px;align-items:center;">';
  html+='<span style="display:flex;align-items:center;gap:3px;"><span style="width:7px;height:7px;border-radius:50%;background:var(--sky);display:inline-block;"></span>水やり</span>';
  html+='<span style="display:flex;align-items:center;gap:3px;"><span style="width:7px;height:7px;border-radius:50%;background:var(--sun);display:inline-block;"></span>追肥</span>';
  html+='<span style="color:#aaa;">日付タップで詳細</span>';
  html+='</div></div>';

  // 日付別の詳細パネルのデータをstateに保存
  state._calDayMap = dayMap;
  state._calYrMo = {yr:yr, mo:mo};
  return html;
}

      html+='</div>';
    });
  }
  if(fItems.length>0){

    fItems.forEach(function(it){
      html+='<div style="display:flex;align-items:center;gap:8px;padding:8px;background:#fff8e6;border-radius:10px;margin-bottom:5px;">';
      html+='<span style="font-size:1.2rem;">'+it.p.emoji+'</span>';
      html+='<div><div style="font-size:.82rem;font-weight:700;">'+it.p.name+'</div><div style="font-size:.68rem;color:#888;">'+it.p.variety+'</div></div>';
      html+='<button onclick="doFertilize('+it.p.id+');closeCalPanel();" style="margin-left:auto;background:var(--sun);color:#fff;border:none;border-radius:8px;padding:5px 10px;font-size:.72rem;cursor:pointer;font-family:inherit;">記録</button>';
      html+='</div>';
    });
  }

  // 一括ボタン
  html+='<div style="display:flex;gap:8px;margin-top:12px;">';
  if(wItems.length>0) html+='<button onclick="bulkWaterList(['+wItems.map(function(it){return it.p.id;}).join(",")+']);closeCalPanel();" style="flex:1;background:#e3f0fa;color:var(--rain);border:1.5px solid var(--sky);border-radius:10px;padding:10px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;">💧 水やり一括記録</button>';
  if(fItems.length>0) html+='<button onclick="bulkFertList(['+fItems.map(function(it){return it.p.id;}).join(",")+']);closeCalPanel();" style="flex:1;background:#fff8e6;color:#9a6500;border:1.5px solid var(--sun);border-radius:10px;padding:10px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;">🌱 追肥一括記録</button>';
  html+='</div></div>';

  el.innerHTML=html;
  el.onclick=function(e){ if(e.target===el) el.style.display="none"; };
}

  var catI = CAT[p.category]||CAT.other;

function buildScanSection(p) {
  var sd = state.scanData;

  if(sd.imgUrl){
    html += '<img src="'+sd.imgUrl+'" alt="" style="width:100%;border-radius:10px;margin-bottom:8px;max-height:180px;object-fit:cover;">';
    html += '<div style="display:flex;gap:6px;margin-bottom:6px;">';
    html += '<button onclick="clearScan()" style="flex:1;background:rgba(255,255,255,.7);border:1.5px solid #e8b87a;border-radius:8px;padding:7px;font-family:inherit;font-size:.75rem;cursor:pointer;color:#9a5a00;">🔄 変える</button>';
    html += '<label style="flex:1;display:flex;align-items:center;justify-content:center;gap:4px;background:#e3f0fa;border:1.5px solid var(--sky);border-radius:8px;padding:7px;font-size:.75rem;font-weight:700;color:var(--rain);cursor:pointer;position:relative;">📷 撮り直す<input type="file" accept="image/*" capture="environment" onchange="setScanPhoto('+p.id+',this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;"></label>';
    html += '</div>';
  } else {
    html += '<div class="scan-drop"><input type="file" accept="image/*" onchange="setScanPhoto('+p.id+',this)"><div style="font-size:1.8rem;margin-bottom:4px;">🔍</div><div style="font-size:.8rem;font-weight:700;color:var(--bark);">診断用の写真を選択</div><div style="font-size:.68rem;color:#aaa;margin-top:2px;">葉・茎・実が見える写真が最適</div></div>';
    html += '<label style="display:flex;align-items:center;justify-content:center;gap:5px;margin-top:6px;background:#e3f0fa;border:1.5px solid var(--sky);color:var(--rain);border-radius:10px;padding:9px;font-size:.8rem;font-weight:700;cursor:pointer;position:relative;">📷 カメラで今すぐ撮影<input type="file" accept="image/*" capture="environment" onchange="setScanPhoto('+p.id+',this)" style="position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;"></label>';
  }

  html += '<button class="diagnose-btn" onclick="diagnose('+p.id+')" '+((!sd.imgB64)||sd.loading?'disabled':'')+'>🔬 AIで診断する</button>';

  if(sd.result){
    var r=sd.result;
    var sc=r.status==="良好"?"#4a6741":r.status==="要注意"?"#9a6500":"#c0392b";
    html += '<div class="diag-box"><div class="diag-title">🔬 診断結果</div>';
    html += '<span class="chip" style="color:'+sc+'">'+r.status+'</span>';
    if(r.health!=null) html += '<span class="chip" style="color:'+(r.health>=75?"#4a6741":r.health>=50?"#9a6500":"#c0392b")+'">健康スコア '+r.health+'/100</span>';
    if(r.issues&&r.issues.length>0){ html+='<div style="margin:5px 0 3px;font-size:.7rem;font-weight:700;color:#9a5a00;">気になる点</div>'; r.issues.forEach(function(iss){html+='<div style="font-size:.75rem;color:#555;padding:1px 0;">・'+iss+'</div>';}); }
    html += '<div style="font-size:.78rem;line-height:1.6;margin:6px 0;">'+r.advice+'</div>';
    if(r.next_action) html += '<div style="background:#fff;border-radius:8px;padding:8px 10px;font-size:.78rem;font-weight:700;color:#9a5a00;">👉 '+r.next_action+'</div>';
    html += '</div>';
  }
  if(sd.loading){
    html += '<div class="ai-box"><div class="ai-box-title">AIが解析中<span class="dots"><span>.</span><span>.</span><span>.</span></span></div></div>';
  }

  html += '</div>';
  return html;
}

// ── API Key 管理 ─────────────────────────────────────────────────────────────
var API_KEY_KEY = "garden-apikey-v1";

function getApiKey(){
  try{ return localStorage.getItem(API_KEY_KEY)||null; }catch(e){ return null; }
}
function saveApiKey(k){
  try{ if(k) localStorage.setItem(API_KEY_KEY,k); else localStorage.removeItem(API_KEY_KEY); }catch(e){}
  return Promise.resolve();
}

function openApiKeyModal(callback){
  var el=document.getElementById("apikey-modal");
  if(!el){
    el=document.createElement("div");
    el.id="apikey-modal";
    el.style.cssText="position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px;";
    document.body.appendChild(el);
  }
  el.style.display="flex";
  var html='<div style="background:#fff;border-radius:16px;padding:20px;width:100%;max-width:400px;">';
  html+='<div style="font-size:1rem;font-weight:700;margin-bottom:8px;">🔑 Anthropic APIキーを設定</div>';
  html+='<div style="font-size:.75rem;color:#888;margin-bottom:12px;line-height:1.5;">AI機能を使うには <a href="https://console.anthropic.com" target="_blank" style="color:var(--moss);">console.anthropic.com</a> でAPIキーを取得して入力してください。</div>';
  html+='<input id="apikey-input" type="password" placeholder="sk-ant-..." style="width:100%;border:1.5px solid var(--petal);border-radius:10px;padding:10px;font-family:inherit;font-size:.85rem;outline:none;margin-bottom:10px;">';
  html+='<div style="display:flex;gap:8px;">';
  html+='<button onclick="document.getElementById(\'apikey-modal\').style.display=\'none\'" style="flex:1;background:var(--cream);border:1.5px solid var(--petal);border-radius:10px;padding:10px;font-family:inherit;cursor:pointer;">キャンセル</button>';
  html+='<button onclick="submitApiKey()" style="flex:1;background:var(--moss);color:#fff;border:none;border-radius:10px;padding:10px;font-family:inherit;font-weight:700;cursor:pointer;">保存して使う</button>';
  html+='</div></div>';
  el.innerHTML=html;
  if(callback) el._callback=callback;
}

async function submitApiKey(){
  var v=(document.getElementById("apikey-input")||{value:""}).value.trim();
  if(!v||!v.startsWith("sk-")){ showToast("正しいAPIキーを入力してください"); return; }
  saveApiKey(v);
  var el=document.getElementById("apikey-modal");
  if(el){ el.style.display="none"; if(el._callback)el._callback(v); }
  showToast("APIキーを保存しました");
}

async function callClaude(messages, maxTokens){
  var key = getApiKey();
  if(!key){
    return new Promise(function(resolve){
      openApiKeyModal(async function(newKey){
        var r = await callClaudeWithKey(newKey, messages, maxTokens);
        resolve(r);
      });
    });
  }
  return callClaudeWithKey(key, messages, maxTokens);
}

async function callClaudeWithKey(key, messages, maxTokens){
  var res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:maxTokens||800,messages:messages})
  });
  if(res.status===401){ saveApiKey(""); throw new Error("Invalid API key"); }
  return res.json();
}

// ── AI診断（写真） ────────────────────────────────────────────────────────────
async function diagnose(id){
  if(!state.scanData.imgB64)return;
  state.scanData.loading=true;
  renderDetail();
  var p=state.plants.find(function(x){return x.id===id;});
  var prompt="家庭菜園アドバイザーとして「"+p.name+"（"+p.variety+"）」の写真を診断してください。JSONのみで回答（前置き不要）:\n{\"health\":数値0-100,\"status\":\"良好\"か\"要注意\"か\"要対処\",\"issues\":[\"問題点\"],\"advice\":\"アドバイス2文\",\"next_action\":\"今すぐやること1文\",\"water_days\":推奨水やり間隔日数,\"fert_days\":推奨追肥間隔日数}";
  try{
    var data=await callClaude([{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:state.scanData.imgB64}},{type:"text",text:prompt}]}],800);
    var raw=(data.content||[]).map(function(c){return c.text||"";}).join("");
    var parsed=JSON.parse(raw.replace(/```json|```/g,"").trim());
    state.scanData.result=parsed;
    if(parsed.health!=null) p.health=parsed.health;
    // 推奨頻度があれば自動更新
    if(parsed.water_days&&parsed.water_days>0) p.waterDays=parsed.water_days;
    if(parsed.fert_days&&parsed.fert_days>0) p.fertilizeDays=parsed.fert_days;
    savePlants();
  }catch(e){
    if(e.message==="Invalid API key"){
      state.scanData.result={health:null,status:"エラー",issues:["APIキーが無効です"],advice:"設定からAPIキーを更新してください。",next_action:"右上メニュー → APIキー設定"};
    } else {
      state.scanData.result={health:null,status:"エラー",issues:[],advice:"診断の取得に失敗しました。もう一度お試しください。",next_action:""};
    }
  }
  state.scanData.loading=false;
  renderDetail();
}

// ── AIアドバイス（テキスト） ──────────────────────────────────────────────────
async function getAIAdvice(id){
  var p=state.plants.find(function(x){return x.id===id;});
  var box=document.getElementById("ai-advice-box");
  if(!box)return;
  box.innerHTML='<div class="ai-box"><div class="ai-box-title">🤖 考えています<span class="dots"><span>.</span><span>.</span><span>.</span></span></div></div>';
  var sun=p.sunlight==="full"?"日向":p.sunlight==="partial"?"半日陰":"日陰";
  var weather=WEATHER.length>0?WEATHER.map(function(w){return w.day+w.icon+w.temp;}).join(" "):"天気データなし";
  var prompt="家庭菜園専門家として「"+p.name+"("+p.variety+")」の今週のお世話アドバイスを3〜4文で。\n水やり:"+daysSince(p.lastWatered)+"日前/"+p.waterDays+"日おき 追肥:"+daysSince(p.lastFertilized)+"日前/"+p.fertilizeDays+"日おき\n日当たり:"+sun+" 健康度:"+p.health+"% 天気:"+weather+"\n最後に推奨する水やり間隔(日)と追肥間隔(日)をJSON形式で:{water_days:数値,fert_days:数値}";
  try{
    var data=await callClaude([{role:"user",content:prompt}],600);
    var raw=(data.content||[]).map(function(c){return c.text||"";}).join("");
    // JSON部分を抽出して頻度更新
    var jsonMatch=raw.match(/\{[^{}]*water_days[^{}]*\}/);
    if(jsonMatch){
      try{
        var rec=JSON.parse(jsonMatch[0]);
        if(rec.water_days>0){ p.waterDays=rec.water_days; }
        if(rec.fert_days>0){ p.fertilizeDays=rec.fert_days; }
        savePlants();
        raw=raw.replace(jsonMatch[0],"").trim();
      }catch(e2){}
    }
    box.innerHTML='<div class="ai-box"><div class="ai-box-title">🤖 今週のお世話アドバイス</div>'+raw+'<div style="margin-top:8px;font-size:.7rem;color:var(--moss);background:#e8f5e2;border-radius:8px;padding:5px 8px;">💧水やり→'+p.waterDays+'日おき　🌱追肥→'+p.fertilizeDays+'日おきに自動更新</div></div>';
  }catch(e){
    if(e.message==="Invalid API key"){
      box.innerHTML='<div class="ai-box" style="border-color:#e07a5f;">APIキーが無効です。<button onclick="openApiKeyModal(function(){getAIAdvice("+id+")})" style="background:var(--moss);color:#fff;border:none;border-radius:8px;padding:4px 10px;cursor:pointer;font-family:inherit;font-size:.75rem;margin-left:5px;">再設定</button></div>';
    } else {
      box.innerHTML='<div class="ai-box">取得に失敗しました。<button onclick="getAIAdvice("+id+")" style="background:none;border:1px solid var(--sprout);border-radius:8px;padding:3px 8px;cursor:pointer;font-family:inherit;font-size:.75rem;margin-left:5px;color:var(--moss);">再試行</button></div>';
    }
  }
}

// ── AI自動判定（植物名から推奨頻度取得） ─────────────────────────────────────
async function fetchPlantProfile(name, variety){
  var prompt="家庭菜園で「"+name+(variety?"("+variety+")":"")+"」を育てる場合の推奨を教えてください。JSONのみで回答:\n{\"water_days\":水やり間隔日数,\"fert_days\":追肥間隔日数,\"sunlight\":\"full\"か\"partial\"か\"shade\",\"notes\":\"栽培のコツ1〜2文\"}";
  try{
    var data=await callClaude([{role:"user",content:prompt}],300);
    var raw=(data.content||[]).map(function(c){return c.text||"";}).join("");
    return JSON.parse(raw.replace(/```json|```/g,"").trim());
  }catch(e){ return null; }
}

async function autoFillPlantProfile(){
  var nameEl=document.getElementById("f-name");

  var variety=(document.getElementById("f-variety")||{value:""}).value.trim();

function submitAdd(){
  var nameEl=document.getElementById("f-name");
  if(!nameEl||!nameEl.value.trim()){showToast("植物名を入力してください");return;}
  var tpl=TEMPLATES[addForm.emoji]||{};
  var name=nameEl.value.trim();
  var variety=(document.getElementById("f-variety")||{value:""}).value.trim();
  var planted=(document.getElementById("f-planted")||{value:todayStr()}).value||todayStr();
  var waterDays=parseInt((document.getElementById("f-water")||{value:3}).value)||3;
  var fertilizeDays=parseInt((document.getElementById("f-fert")||{value:14}).value)||14;
  var sunlight=(document.getElementById("f-sun")||{value:"full"}).value||"full";
  var notes=(document.getElementById("f-notes")||{value:""}).value.trim();
  var category=tpl.cat||addForm.category||"vegetable";

  if(addForm.editId){
    // 編集モード：既存植物を更新
    state.plants=state.plants.map(function(p){
      if(p.id!==addForm.editId) return p;
      var updated=Object.assign({},p,{
        name:name, variety:variety, emoji:addForm.emoji,
        category:category, planted:planted,
        waterDays:waterDays, fertilizeDays:fertilizeDays,
        sunlight:sunlight, notes:notes,
      });
      // カバー写真を変更した場合は先頭に追加
      if(addForm.coverUrl){
        updated.photos=[{url:addForm.coverUrl,date:todayStr()}].concat(p.photos||[]);
      }
      return updated;
    });
    closeAddModal();
    savePlants().then(function(){
      state.detailId=addForm.editId;
      renderDetail();
      showToast(name+"を更新しました");
    });
  } else {
    // 新規追加モード
    var p={
      id: Date.now(),
      name:name, variety:variety, emoji:addForm.emoji,
      category:category, planted:planted,
      lastWatered:todayStr(), lastFertilized:todayStr(),
      waterDays:waterDays, fertilizeDays:fertilizeDays,
      sunlight:sunlight, health:100, notes:notes,
      photos: addForm.coverUrl ? [{url:addForm.coverUrl,date:todayStr()}] : [],
      logs: [{date:todayStr(),note:"植え付け",photoUrl:addForm.coverUrl||null}],
    };
    state.plants.push(p);
    closeAddModal();
    savePlants().then(function(){
      showScreen("list");
      showToast(p.name+"を追加しました");
    });
  }
}

function deletePlant(id){
  if(!confirm("この植物を削除しますか？\n記録・写真もすべて削除されます。")) return;
  state.plants=state.plants.filter(function(p){return p.id!==id;});
  closeAddModal();
  savePlants().then(function(){
    backToList();
    showToast("削除しました");
  });
}

// ── Location modal ───────────────────────────────────────────────────────────
function openLocationModal(){
  var el = document.getElementById("location-modal");
  if(!el){
    el = document.createElement("div");
    el.id = "location-modal";
    el.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:150;display:flex;align-items:flex-end;";
    document.body.appendChild(el);
  }
  var curName = state.location ? state.location.name : "東京";
  var presetsHtml = LOCATION_PRESETS.map(function(p){
    var sel = p.name===curName ? "background:var(--moss);color:#fff;border-color:var(--moss);" : "";
    return '<button onclick="selectLocation(\"'+p.name+'\",'+p.lat+','+p.lon+')" style="border:1.5px solid var(--petal);background:'+(p.name===curName?'var(--moss)':'var(--cream)')+';color:'+(p.name===curName?'#fff':'var(--bark)')+';border-radius:20px;padding:6px 14px;font-family:inherit;font-size:.78rem;font-weight:700;cursor:pointer;">'+p.name+'</button>';
  }).join("");

  el.innerHTML = '<div style="background:#fff;border-radius:20px 20px 0 0;width:100%;padding:16px 16px calc(16px + env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto;">'
    +'<div style="width:36px;height:4px;background:var(--petal);border-radius:2px;margin:0 auto 14px;"></div>'
    +'<div style="font-family:Shippori Mincho,serif;font-size:1.05rem;font-weight:600;margin-bottom:12px;">📍 地域を選択</div>'
    +'<div style="display:flex;flex-wrap:wrap;gap:7px;margin-bottom:14px;">'+presetsHtml+'</div>'
    +'<div style="font-size:.72rem;font-weight:700;color:var(--bark);margin-bottom:6px;">または地名で検索</div>'
    +'<div style="display:flex;gap:6px;margin-bottom:10px;">'
    +'<input id="loc-search" type="text" placeholder="例: 京都市、鎌倉市、帯広..." style="flex:1;border:1.5px solid var(--petal);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:.85rem;outline:none;" onkeydown="if(event.key===\'Enter\')searchLocation()">'
    +'<button onclick="searchLocation()" style="background:var(--moss);color:#fff;border:none;border-radius:10px;padding:9px 14px;font-family:inherit;font-size:.82rem;cursor:pointer;font-weight:700;">検索</button>'
    +'</div>'
    +'<div id="loc-search-result"></div>'
    +'<div style="display:flex;gap:8px;margin-top:4px;">'
    +'<button onclick="useCurrentLocation()" style="flex:1;background:#e3f0fa;color:var(--rain);border:1.5px solid var(--sky);border-radius:10px;padding:10px;font-family:inherit;font-size:.8rem;font-weight:700;cursor:pointer;">📡 現在地を使用</button>'
    +'<button onclick="closeLocationModal()" style="flex:1;background:var(--cream);color:var(--soil);border:1.5px solid var(--petal);border-radius:10px;padding:10px;font-family:inherit;font-size:.8rem;cursor:pointer;">閉じる</button>'
    +'</div>'
    +'</div>';
  el.onclick = function(e){ if(e.target===el) closeLocationModal(); };
}

function closeLocationModal(){
  var el = document.getElementById("location-modal");
  if(el) el.style.display="none";
}

async function selectLocation(name, lat, lon){
  state.location = {name:name,lat:lat,lon:lon};
  await saveLocation(state.location);
  closeLocationModal();
  showToast(name+"の天気を取得中...");
  await fetchWeather(lat, lon);
  renderList();
  if(state.currentScreen==="today") renderToday();
  if(state.detailId) renderDetail();
}

async function searchLocation(){
  var q = (document.getElementById("loc-search")||{value:""}).value.trim();
  if(!q) return;
  var resultEl = document.getElementById("loc-search-result");
  if(resultEl) resultEl.innerHTML = '<div style="font-size:.75rem;color:#aaa;padding:4px 0;">検索中...</div>';
  try {
    var url = "https://geocoding-api.open-meteo.com/v1/search?name="+encodeURIComponent(q)+"&count=5&language=ja&format=json";
    var res = await fetch(url);
    var data = await res.json();
    if(!data.results||data.results.length===0){
      if(resultEl) resultEl.innerHTML='<div style="font-size:.75rem;color:#aaa;padding:4px 0;">見つかりませんでした</div>';
      return;
    }
    var html = '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:8px;">';
    data.results.forEach(function(r){
      var label = r.name + (r.admin1?" ("+r.admin1+")":"");
      html += '<button onclick="selectLocation(\''+r.name+'\','+r.latitude+','+r.longitude+')" style="text-align:left;background:var(--cream);border:1.5px solid var(--petal);border-radius:10px;padding:9px 12px;font-family:inherit;font-size:.8rem;cursor:pointer;color:var(--soil);">📍 '+label+'</button>';
    });
    html += '</div>';
    if(resultEl) resultEl.innerHTML = html;
  } catch(e) {
    if(resultEl) resultEl.innerHTML='<div style="font-size:.75rem;color:#c0392b;padding:4px 0;">検索に失敗しました</div>';
  }
}

function useCurrentLocation(){
  if(!navigator.geolocation){ showToast("位置情報が使えません"); return; }
  showToast("現在地を取得中...");
  navigator.geolocation.getCurrentPosition(async function(pos){
    var lat=pos.coords.latitude, lon=pos.coords.longitude;
    // 逆ジオコーディング（Open-Meteo Geocoding）
    try {
      var url="https://geocoding-api.open-meteo.com/v1/search?name=&latitude="+lat+"&longitude="+lon+"&count=1&language=ja";
      // Open-Meteoに逆ジオコーディングはないのでlatlon表記で
    } catch(e){}
    var name = "現在地("+lat.toFixed(2)+","+lon.toFixed(2)+")";
    await selectLocation(name, lat, lon);
  }, function(){ showToast("位置情報の取得に失敗しました"); });
}

// ── Firebase Auth ─────────────────────────────────────────────────────────────
function firebaseSignIn(){
  if(!window._fb){ showToast("Firebaseの設定が必要です"); return; }
  var isMobile = /iphone|ipad|ipod|android/i.test(navigator.userAgent);
  if(isMobile){
    // スマホ：リダイレクト方式
    window._fb.auth.signInWithRedirect(window._fb.provider)
      .catch(function(e){ showToast("ログインに失敗しました: " + e.message); });
  } else {
    // PC：ポップアップ方式
    window._fb.auth.signInWithPopup(window._fb.provider)
      .then(function(result){
        if(result && result.user){
          state_uid = result.user.uid;
          showToast(result.user.displayName + " でログインしました");
          renderList();
          loadFromFirestore(result.user.uid);
        }
      })
      .catch(function(e){
        var user = window._fb.auth.currentUser;
        if(user){
          state_uid = user.uid;
          showToast("ログインしました");
          renderList();
          loadFromFirestore(user.uid);
        } else {
          showToast("ログインに失敗しました: " + e.code);
        }
      });
  }
}

// ── データエクスポート/インポート ──────────────────────────────────────────────
function closeExportModal(){ var el=document.getElementById("export-modal"); if(el) el.style.display="none"; }
function closeImportModal(){ var el=document.getElementById("import-modal"); if(el) el.style.display="none"; }
function exportData(){
  var data = JSON.stringify(state.plants);
  // テキストエリアに表示してコピーできるようにする
  var el = document.getElementById("export-modal");
  if(!el){
    el = document.createElement("div");
    el.id = "export-modal";
    el.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;";
    document.body.appendChild(el);
  }
  el.style.display = "flex";
  el.innerHTML = '<div style="background:#fff;border-radius:20px 20px 0 0;width:100%;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'
    + '<div style="font-weight:700;font-size:.95rem;">📤 データのバックアップ</div>'
    + '<button onclick="closeExportModal()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">✕</button>'
    + '</div>'
    + '<div style="font-size:.75rem;color:#888;margin-bottom:8px;">下のテキストを全選択してコピーしてください</div>'
    + '<textarea id="export-text" style="width:100%;height:120px;border:1.5px solid var(--petal);border-radius:10px;padding:8px;font-size:.7rem;font-family:monospace;" readonly>' + data + '</textarea>'
    + '<div style="display:flex;gap:8px;margin-top:10px;">'
    + '<button onclick="copyExportData()" style="flex:1;background:var(--moss);color:#fff;border:none;border-radius:10px;padding:11px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;">📋 コピー</button>'
    + '<button onclick="openImportModal()" style="flex:1;background:var(--cream);color:var(--soil);border:1.5px solid var(--petal);border-radius:10px;padding:11px;font-family:inherit;font-size:.85rem;cursor:pointer;">📥 インポート</button>'
    + '</div></div>';
  el.onclick = function(e){ if(e.target===el) el.style.display="none"; };
}

function copyExportData(){
  var ta = document.getElementById("export-text");
  if(ta){
    ta.select();
    try {
      document.execCommand("copy");
      showToast("コピーしました！");
    } catch(e) {
      // モバイルのフォールバック
      navigator.clipboard.writeText(ta.value).then(function(){
        showToast("コピーしました！");
      }).catch(function(){
        showToast("テキストを手動でコピーしてください");
      });
    }
  }
}

function openImportModal(){
  document.getElementById("export-modal").style.display="none";
  var el = document.getElementById("import-modal");
  if(!el){
    el = document.createElement("div");
    el.id = "import-modal";
    el.style.cssText = "position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:flex;align-items:flex-end;";
    document.body.appendChild(el);
  }
  el.style.display = "flex";
  el.innerHTML = '<div style="background:#fff;border-radius:20px 20px 0 0;width:100%;padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom));">'
    + '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">'
    + '<div style="font-weight:700;font-size:.95rem;">📥 データのインポート</div>'
    + '<button onclick="closeImportModal()" style="background:none;border:none;font-size:1.2rem;cursor:pointer;">✕</button>'
    + '</div>'
    + '<div style="font-size:.75rem;color:#888;margin-bottom:8px;">バックアップデータを貼り付けてください</div>'
    + '<textarea id="import-text" style="width:100%;height:120px;border:1.5px solid var(--petal);border-radius:10px;padding:8px;font-size:.7rem;font-family:monospace;" placeholder="ここにバックアップデータを貼り付け..."></textarea>'
    + '<button onclick="doImport()" style="width:100%;background:var(--moss);color:#fff;border:none;border-radius:10px;padding:11px;font-family:inherit;font-size:.85rem;font-weight:700;cursor:pointer;margin-top:10px;">インポートする</button>'
    + '</div>';
  el.onclick = function(e){ if(e.target===el) el.style.display="none"; };
}

function doImport(){
  var ta = document.getElementById("import-text");
  if(!ta || !ta.value.trim()){ showToast("データを入力してください"); return; }
  try {
    var plants = JSON.parse(ta.value.trim());
    if(!Array.isArray(plants)){ throw new Error("Invalid format"); }
    state.plants = plants;
    savePlants();
    document.getElementById("import-modal").style.display="none";
    renderList();
    showToast(plants.length + "株のデータをインポートしました");
  } catch(e) {
    showToast("データの形式が正しくありません");
  }
}

function firebaseSignOut(){
  if(!window._fb) return;
  window._fb.auth.signOut().then(function(){
    state_uid = null;
    showToast("ログアウトしました（データはこの端末に残ります）");
    renderList();
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async function(){
  var loc = loadLocation();
  state.location = loc;
  state.plants = loadPlants();
  renderList();

  // 天気をバックグラウンドで取得
  fetchWeather(loc.lat, loc.lon).then(function(ok){
    if(ok){
      renderList();
      if(state.currentScreen==="today") renderToday();
    }
  });

  // Firebase Auth 状態監視（SDKロード後に実行）
  function initFirebaseAuth(){
    if(!window._fb){ setTimeout(initFirebaseAuth, 200); return; }

    // onAuthStateChanged を最優先で設定
    window._fb.auth.onAuthStateChanged(async function(user){
      console.log("onAuthStateChanged:", user ? user.uid : "null");
      if(user){
        state_uid = user.uid;
        renderList();
        await loadFromFirestore(user.uid);
        // ログイン後に保存もトリガー（スマホのデータをクラウドに）
        if(state.plants && state.plants.length > 0){
          savePlants();
        }
      } else {
        state_uid = null;
        renderList();
      }
    });

    // リダイレクト後の結果を処理
    window._fb.auth.getRedirectResult().then(function(result){
      if(result && result.user){
        console.log("getRedirectResult success:", result.user.uid);
        showToast(result.user.displayName + " でログインしました");
        state_uid = result.user.uid;
        renderList();
      }
    }).catch(function(e){
      console.warn("getRedirectResult error:", e.code, e.message);
    });

    // currentUserが既にある場合（リロード時）
    var currentUser = window._fb.auth.currentUser;
    if(currentUser && !state_uid){
      console.log("currentUser found:", currentUser.uid);
      state_uid = currentUser.uid;
      renderList();
      loadFromFirestore(currentUser.uid);
    }
  }
  initFirebaseAuth();

  // iOS install hint
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
  if(isIOS&&!window.navigator.standalone){
    setTimeout(function(){ showToast("Safariの共有→ホーム画面に追加でアプリ化できます"); },2000);
  }
})();
</script>
